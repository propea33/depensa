name: 💪 Scrape Gym Prices

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python scraper/scrape.py
        continue-on-error: true
      - run: |
          git config user.name  "gym-scraper[bot]"
          git config user.email "actions@github.com"
          git add data/gym-prices.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "chore: update gym prices $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
